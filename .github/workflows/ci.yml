name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --check mcp-server/server/index.js
      - name: mcp-server client migration tests
        run: node --test test/*.test.mjs
        working-directory: mcp-server
      - name: worker install + dry-run deploy + OAuth device-flow tests
        run: |
          npm ci
          npx wrangler deploy --dry-run --outdir dist
          npm test
        working-directory: worker

  # Gate job: single Required status check for branch protection.
  # Add new jobs to `needs` when CI grows. No Settings change needed.
  CI:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "CI failed: test=${{ needs.test.result }}"
            exit 1
          fi
